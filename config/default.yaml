watcher:
  directories:
    - "./docs/watched"
  extensions: [".md", ".markdown"]

claude:
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-3-5-sonnet-20241022"
  max_tokens: 1024
  temperature: 0.3

embeddings:
  provider: "claude"
  model: "claude-3-haiku-20240307"
  dimension: 1536

database:
  sqlite: "./data/db/knowledge.db"
  chroma: "./data/vectors/chroma"

processing:
  batch_size: 5
  retry_attempts: 3
  summary_max_length: 200
  max_tags: 7

search:
  default_method: "hybrid"
  max_results: 20

similarity:
  threshold: 0.85
